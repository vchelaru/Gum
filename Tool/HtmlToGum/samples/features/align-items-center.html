<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 800px; height: 600px; background: #181820; }
  #bar {
    position: absolute; left: 40px; top: 40px;
    width: 400px; height: 120px;
    display: flex; flex-direction: row; gap: 12px;
    align-items: center;
    background: #2a2a38;
  }
  .a { width: 60px; height: 40px; background: #e0a53c; }
  .b { width: 60px; height: 80px; background: #3c8a5a; }
  .c { width: 60px; height: 24px; background: #5a3c8a; }
</style>
</head>
<body>
  <div id="bar">
    <div class="a"></div>
    <div class="b"></div>
    <div class="c"></div>
  </div>
</body>
</html>
