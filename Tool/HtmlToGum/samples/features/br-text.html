<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>br text lines</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 800px; height: 400px; background: #181820; font-family: Arial, sans-serif; }
  #panel {
    position: absolute; left: 40px; top: 40px;
    width: 320px; padding: 16px;
    background: #2a2a38; color: #eee; font-size: 14px; line-height: 1.4;
  }
  #panel p { margin: 0 0 12px; }
  #badge {
    display: block;
    padding: 10px 14px;
    background: #3c5a8a;
    text-align: center;
    color: #ffe08a;
  }
</style>
</head>
<body>
  <div id="panel">
    <p>Mira — Mage<br>HP 40 / 40</p>
    <p>Gorn — Fighter<br>HP 62 / 80</p>
    <div id="badge">Gold: 1,250</div>
  </div>
</body>
</html>
