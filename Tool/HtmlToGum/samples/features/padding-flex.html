<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 800px; height: 600px; background: #181820; }
  #panel {
    position: absolute; left: 40px; top: 40px;
    width: 280px; height: 200px;
    display: flex; flex-direction: column; gap: 8px;
    padding: 16px 24px;
    background: #3c3c50;
  }
  .row { height: 40px; background: #e0a53c; }
  .row2 { height: 40px; background: #3c8a5a; }
</style>
</head>
<body>
  <div id="panel">
    <div class="row"></div>
    <div class="row2"></div>
  </div>
</body>
</html>
