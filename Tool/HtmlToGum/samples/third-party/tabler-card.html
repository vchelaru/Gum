<!doctype html>
<html>
<head>
<meta charset="utf-8">
<!-- Real Tabler CSS, pinned to 1.4.0 (@latest poisoned pixel baselines across sessions).
     Tabler's CSS *names* Inter Var but does not ship @font-face — without this face,
     Chromium falls back to a system stack while computed style still says "Inter Var",
     and the converter cannot embed a real TTF for gumcli fonts. -->
<link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" rel="stylesheet">
<style>
  @font-face {
    font-family: "Inter Var";
    font-style: normal;
    font-display: swap;
    font-weight: 100 900;
    src: url("https://cdn.jsdelivr.net/npm/@fontsource-variable/inter@5.2.5/files/inter-latin-wght-normal.woff2") format("woff2-variations");
  }
  body { background: #f4f6fa; padding: 20px; }
</style>
</head>
<body>
  <!-- Verbatim markup + real Bootstrap grid classes copied from
       https://preview.tabler.io/cards.html ("Card with top status").
       Not written for this converter — cut from a real, uncurated page. -->
  <div class="container-xl">
    <div class="row row-deck row-cards">
      <div class="col-md-6 col-lg-3">
        <div class="card">
          <div class="card-status-top bg-danger"></div>
          <div class="card-body">
            <h3 class="card-title">Card with top status</h3>
            <p class="text-secondary">
              Lorem ipsum dolor sit amet, consectetur adipisicing elit. Aperiam deleniti fugit incidunt, iste, itaque minima neque pariatur perferendis
              sed suscipit velit vitae voluptatem.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
