name: "Build Samples"

# Push/PR triggers make this the regression test for Samples/SilkNetGum, the
# proof-of-concept that SkiaGum is drop-in for a Silk.NET host (#2738). Without
# them it only ran on manual dispatch and could silently bitrot (#3570).
on:
  push:
    branches: [main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
    Build-Samples:
        runs-on: windows-latest
        steps:
            # See build-and-test.yaml for why we init submodules manually
            # instead of using actions/checkout's `submodules: recursive`.
            - name: Clone Repository
              uses: actions/checkout@v4
              with:
                submodules: false
            - name: Init submodules (non-shallow)
              run: git submodule update --init --recursive

            - name: Setup .NET SDKs
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 9.0.x

            - name: Install .NET MAUI Workload
              run: dotnet workload install maui

            - name: Build Samples
              run: pwsh ./.github/scripts/build-all.ps1 -Path Samples
